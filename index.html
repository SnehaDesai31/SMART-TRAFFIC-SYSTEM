<!DOCTYPE html>
<html>
<head>
<title>Smart Traffic Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* HEADER */
.header {
    padding: 15px;
    font-size: 24px;
    background: #111;
    text-align: center;
}

/* LAYOUT */
.main {
    display: grid;
    grid-template-columns: 250px 1fr;
}

/* SIDEBAR */
.sidebar {
    background: #0b132b;
    height: 100vh;
    padding: 15px;
}

/* CONTENT */
.content {
    padding: 20px;
}

/* CARD */
.card {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* INPUT */
input, select {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 6px;
    border: none;
}

/* BUTTON */
button {
    padding: 10px 20px;
    background: #00c853;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* ===== NEW SIGNAL DESIGN ===== */
.signal-container {
    display: flex;
    justify-content: space-around;
    margin-top: 15px;
}

.signal-road {
    text-align: center;
}

.traffic-light {
    background: #111;
    padding: 10px;
    border-radius: 10px;
    width: 50px;
    margin: auto;
}

.light {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    margin: 6px auto;
    background: #333;
}

.red.active { background: red; }
.yellow.active { background: gold; }
.green.active { background: lime; }

.road-label {
    margin-bottom: 5px;
    font-size: 14px;
}

/* ALERTS */
.alert {
    padding: 8px;
    margin: 5px 0;
    border-radius: 5px;
}

.critical { background: red; }
.warning { background: orange; }
.info { background: blue; }

</style>
</head>

<body>

<div class="header">🚦 Smart Traffic Control Dashboard</div>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>⚙️ Controls</h3>

<select id="road_type" onchange="updateRoads()">
<option value="one">One Way</option>
<option value="two">Two Way</option>
<option value="three">Three Way</option>
<option value="four">Four Way</option>
</select>

<div id="roads"></div>

<select id="vehicle">
<option value="none">No Emergency</option>
<option value="road1">🚑 Road 1</option>
<option value="road2">🔥 Road 2</option>
<option value="road3">🚓 Road 3</option>
<option value="road4">🚑 Road 4</option>
</select>

<button onclick="run()">Run System</button>

</div>

<!-- CONTENT -->
<div class="content">

<div class="grid">

<!-- SIGNAL -->
<div class="card">
<h3>🚦 Traffic Signal Status</h3>
<div id="signals" class="signal-container"></div>
</div>

<!-- ANALYTICS -->
<div class="card">
<h3>📊 Traffic Analytics</h3>
<p>🚗 Level: <span id="level"></span></p>
<p>⏱️ Wait: <span id="wait"></span></p>
</div>

</div>

<div class="grid">

<div class="card">
<h3>📈 Vehicle Flow</h3>
<canvas id="flowChart"></canvas>
</div>

<div class="card">
<h3>🌫️ CO₂ Emission</h3>
<canvas id="co2Chart"></canvas>
</div>

</div>

<div class="card">
<h3>🧠 Fuzzy Logic Analysis</h3>
<p id="fuzzy"></p>
</div>

<div class="card">
<h3>🚨 Alerts & Notifications</h3>
<div id="alerts"></div>
</div>

</div>

</div>

<script>

// dynamic inputs
function updateRoads(){
    let type = document.getElementById("road_type").value;
    let count = 1;

    if(type=="two") count=2;
    else if(type=="three") count=3;
    else if(type=="four") count=4;

    let html="";
    for(let i=1;i<=count;i++){
        html += `<input id="r${i}" placeholder="🚗 Road ${i} Density">`;
    }

    document.getElementById("roads").innerHTML = html;
}

updateRoads();

// main function
function run(){

let r1 = document.getElementById("r1")?.value || 0;
let r2 = document.getElementById("r2")?.value || 0;
let r3 = document.getElementById("r3")?.value || 0;
let r4 = document.getElementById("r4")?.value || 0;

let vehicle = document.getElementById("vehicle").value;
let road_type = document.getElementById("road_type").value;

fetch('/calculate',{
method:'POST',
headers:{'Content-Type':'application/json'},
body: JSON.stringify({r1,r2,r3,r4,vehicle,road_type})
})
.then(res=>res.json())
.then(data=>{

// ===== NEW SIGNAL UI =====
let html = "";

for(let i=1; i<=data.count; i++){

    let red = "", yellow = "", green = "";

    if(i == data.green){
        green = "active";
    } 
    else if(i == data.green - 1){
        yellow = "active";
    } 
    else {
        red = "active";
    }

    html += `
    <div class="signal-road">
        <div class="road-label">🚗 Road ${i}</div>
        <div class="traffic-light">
            <div class="light red ${red}"></div>
            <div class="light yellow ${yellow}"></div>
            <div class="light green ${green}"></div>
        </div>
    </div>
    `;
}

document.getElementById("signals").innerHTML = html;


// ANALYTICS
document.getElementById("level").innerText=data.level;
document.getElementById("wait").innerText=data.wait+" sec";

// FUZZY
document.getElementById("fuzzy").innerText =
data.emergency ? "🚑 Emergency override activated"
: "🧠 Signal selected based on highest density";

// ALERTS
let alertHTML="";
if(data.emergency)
alertHTML+=`<div class="alert critical">Emergency Vehicle Detected</div>`;

if(data.level=="Critical")
alertHTML+=`<div class="alert critical">High Congestion</div>`;
else if(data.level=="High")
alertHTML+=`<div class="alert warning">Moderate Congestion</div>`;

alertHTML+=`<div class="alert info">System Running</div>`;

document.getElementById("alerts").innerHTML=alertHTML;


// CHARTS
let labels=[];
for(let i=1;i<=data.count;i++) labels.push("R"+i);

new Chart(document.getElementById("flowChart"),{
type:'line',
data:{labels:labels,datasets:[{data:data.densities}]}
});

new Chart(document.getElementById("co2Chart"),{
type:'bar',
data:{labels:labels,datasets:[{data:data.densities}]}
});

});
}
</script>

</body>
</html>
